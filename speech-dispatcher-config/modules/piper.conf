# Changes made versus the default piper.conf generated by Pied:
# - Speech rate is mapped to piper --length_scale (via bc) so spd-say -r has
#   an audible effect in this generic module setup.
# - sox tempo was removed; piper handles speaking speed directly for more
#   natural quality and consistent behavior when sox is unavailable.
# - --sentence_silence 0 plus GenericMaxChunkLength/GenericDelimiters reduce
#   long gaps caused by sentence chunking and per-sentence piper restarts.
GenericExecuteSynth "LSCALE=$(echo \"scale=3; e(-($RATE) * 0.693147)\" | bc -l);\
    if command -v sox > /dev/null; then\
        PROCESS=\'sox -r 22050 -c 1 -b 16 -e signed-integer -t raw - -t wav - pitch $PITCH norm\';\
        if command -v paplay > /dev/null; then\
            OUTPUT=\'$PLAY_COMMAND\';\
        else\
            OUTPUT=\'aplay\';\
        fi;\
    elif command -v paplay > /dev/null; then\
        PROCESS=\'cat\'; OUTPUT=\'$PLAY_COMMAND --raw --channels 1 --rate 22050\';\
    else\
        PROCESS=\'cat\'; OUTPUT=\'aplay -t raw -c 1 -r 22050 -f S16_LE\';\
    fi;\
    echo \'$DATA\' | /home/steinbro/snap/pied/common/piper/piper --model /home/steinbro/snap/pied/common/models/en_US-lessac-high.onnx -s 0 --output_raw --length_scale $LSCALE --sentence_silence 0 | $PROCESS | $OUTPUT;"
GenericMaxChunkLength 10000
GenericDelimiters ""
GenericRateAdd 0
GenericPitchAdd 1
GenericVolumeAdd 1
GenericRateMultiply 1
GenericPitchMultiply 1000
AddVoice "en_US" "MALE1" "Piper"
